<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reid Cavallini</title>
  <style>
    @font-face {
      font-family: 'Newsreader';
      font-style: normal;
      font-weight: 300 500;
      src: url(fonts/newsreader-normal.woff2) format('woff2');
    }
    @font-face {
      font-family: 'Newsreader';
      font-style: italic;
      font-weight: 300 400;
      src: url(fonts/newsreader-italic.woff2) format('woff2');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      background: #fafaf4;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .card {
      position: absolute;
      top: 64px;
      left: 64px;
      font-family: 'Newsreader', Georgia, 'Times New Roman', serif;
      color: #2c4661;
    }

    .mark {
      margin-bottom: 20px;
    }

    .name {
      font-size: 21px;
      font-weight: 400;
      font-style: normal;
      letter-spacing: -0.01em;
      line-height: 1;
      margin-bottom: 28px;
    }

    .projects {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 5px 16px;
      margin-bottom: 28px;
    }

    .project-name {
      font-size: 14px;
      font-weight: 500;
      line-height: 1.4;
    }

    .project-desc {
      font-size: 14px;
      font-weight: 300;
      line-height: 1.4;
      opacity: 0.5;
    }

    .contact {
      font-size: 13px;
      font-weight: 300;
      opacity: 0.4;
    }

    .contact a {
      color: inherit;
      text-decoration: none;
    }

    .contact a:hover {
      opacity: 0.7;
    }

    .sep {
      margin: 0 6px;
    }

    @media (max-width: 600px) {
      .card {
        top: 40px;
        left: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">
      <svg width="34" height="38" viewBox="0 0 34 38" fill="none">
        <!-- faint outer lines — depth -->
        <line x1="1" y1="0" x2="17" y2="20" stroke="#2c4661" stroke-width="0.75" opacity="0.12"/>
        <line x1="33" y1="0" x2="17" y2="20" stroke="#2c4661" stroke-width="0.75" opacity="0.12"/>
        <!-- primary convergence -->
        <line x1="7" y1="0" x2="17" y2="20" stroke="#c1440e" stroke-width="1.1"/>
        <line x1="17" y1="0" x2="17" y2="20" stroke="#2656a8" stroke-width="1.1"/>
        <line x1="27" y1="0" x2="17" y2="20" stroke="#c9972c" stroke-width="1.1"/>
        <!-- node -->
        <rect x="12" y="18.5" width="10" height="7" rx="1.5" fill="#2c4661"/>
        <!-- output -->
        <line x1="17" y1="25.5" x2="17" y2="38" stroke="#2c4661" stroke-width="1.1"/>
      </svg>
    </div>

    <h1 class="name">Reid Cavallini</h1>

    <div class="projects">
      <span class="project-name">Spectra</span>
      <span class="project-desc">Value Chain Intelligence, Visualized</span>
      <span class="project-name">FirstLook</span>
      <span class="project-desc">Company URL in &rarr; report out</span>
    </div>

    <div class="contact">
      <a href="mailto:reidcavallini@gmail.com">Email</a>
      <span class="sep">&middot;</span>
      <a href="https://www.linkedin.com/in/reid-cavallini-b4b229131/" target="_blank" rel="noopener">LinkedIn</a>
    </div>
  </div>
</body>
</html>
